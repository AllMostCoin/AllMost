<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllMostCoin</title>
    <style>
        html { font-size: 12px; }
        @media (min-width: 640px) { html { font-size: 13px; } }
        @media (min-width: 768px) { html { font-size: 14px; } }
        @media (min-width: 1024px) { html { font-size: 15px; } }
        h1 { font-size: clamp(3rem, 9vw, 5.5rem); line-height: 0.95; }
        h2 { font-size: clamp(2rem, 6vw, 3.25rem); line-height: 1.05; }
        h3 { font-size: clamp(1.1rem, 3.2vw, 1.5rem); }
        p { font-size: 1rem; line-height: 1.6; }
    </style>
</head>
<body>
    <header>
        <h1 class="font-bold leading-none neon-text">Welcome to AllMostCoin</h1>
    </header>
    <section>
        <h2 class="font-bold mb-8">Latest Updates</h2>
        <h3 class="font-bold mb-2">Announcement</h3>
        <p>Stay tuned for the latest news!</p>
    </section>
</body>
</html>
